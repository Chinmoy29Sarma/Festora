<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard | Festora</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

<div class="logo">
<img src="../Assets/logo/festo-logo.svg">
<span>Festora</span>
</div>

<nav class="nav-links">
<a href="../index.html">Home</a>
<a href="../index.html#featured">Explore</a>
<a href="#">Logout</a>
</nav>

</header>


<section class="dashboard">

<h1>My Dashboard</h1>


<!-- USER PROFILE -->
<div class="profile-card">

<h2 id="welcomeUser">Welcome</h2>

<p id="userEmail">Email:</p>

</div>


<!-- USER STATS -->
<div class="stats">

<div class="stat-card">
<h3 id="registeredCount">0</h3>
<p>Registered Events</p>
</div>

<div class="stat-card">
<h3 id="completedCount">0</h3>
<p>Completed</p>
</div>

<div class="stat-card">
<h3 id="upcomingCount">0</h3>
<p>Upcoming</p>
</div>

</div>


<!-- UPCOMING EVENTS -->
<h2 class="section-title">Upcoming Events</h2>

<div class="events-grid" id="upcomingEvents">

<!-- events will appear here -->

</div>


<!-- COMPLETED EVENTS -->
<h2 class="section-title">Completed Events</h2>

<div class="events-grid" id="completedEvents">

<!-- events will appear here -->

</div>


</section>

</body>
</html>
